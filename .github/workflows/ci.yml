name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # Backend
  # ─────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test
        env:
          NODE_ENV: test
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  # ─────────────────────────────────────────────
  # Frontend (Inventory)
  # ─────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

  # ─────────────────────────────────────────────
  # POS Unit Tests
  # ─────────────────────────────────────────────
  pos-unit-tests:
    name: POS Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/POS

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/POS/package-lock.json

      - name: Install POS dependencies
        run: npm ci

      - name: Run POS unit tests
        run: npm run test:unit

  # ─────────────────────────────────────────────
  # POS Playwright E2E
  # ─────────────────────────────────────────────
  e2e-tests:
    name: POS E2E Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/POS

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/POS/package-lock.json

      - name: Install POS dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Build POS
        run: npm run build

      - name: Run Playwright Tests
        run: npm run test:e2e
        env:
          NODE_ENV: test
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/POS/playwright-report

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: frontend/POS/test-results